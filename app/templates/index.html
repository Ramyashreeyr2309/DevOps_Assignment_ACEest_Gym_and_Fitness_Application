<!DOCTYPE html>
<html>
<head>
    <title>ACEest Fitness v2.0.1</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 800px; border: 2px solid #d4af37; padding: 20px; margin-top: 50px; border-radius: 10px; background: #262626; }
        h1 { color: #d4af37; text-align: center; border-bottom: 1px solid #d4af37; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #d4af37; }
        input, select { width: 100%; padding: 8px; background: #333; border: 1px solid #444; color: white; }
        button { background: #d4af37; color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-right: 10px; }
        #summary { background: #000; color: #0f0; font-family: monospace; padding: 15px; border: 1px solid #d4af37; margin-top: 20px; white-space: pre; }
    </style>
</head>
<body>

<div class="container">
    <h1>ACEest PERFORMANCE v2.0.1</h1>
    
    <div class="form-group">
        <label>Client Name</label>
        <input type="text" id="name">
    </div>
    <div class="form-group">
        <label>Age</label>
        <input type="number" id="age">
    </div>
    <div class="form-group">
        <label>Weight (kg)</label>
        <input type="number" id="weight">
    </div>
    <div class="form-group">
        <label>Program</label>
        <select id="program">
            {% for p in programs %}
            <option value="{{ p }}">{{ p }}</option>
            {% endfor %}
        </select>
    </div>

    <button onclick="saveData()">Save Client</button>
    <button onclick="loadData()" style="background: #555; color: white;">Load Client</button>

    <div id="summary">CLIENT PROFILE SUMMARY WILL APPEAR HERE</div>
</div>

<script>
async function saveData() {
    const data = {
        name: document.getElementById('name').value,
        age: document.getElementById('age').value,
        weight: document.getElementById('weight').value,
        program: document.getElementById('program').value
    };
    const response = await fetch('/save_client', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const result = await response.json();
    alert(result.message);
    if(result.status === 'success') loadData();
}

async function loadData() {
    const name = document.getElementById('name').value;
    const response = await fetch(`/load_client/${name}`);
    const data = await response.json();
    
    if(data.error) {
        alert(data.error);
    } else {
        document.getElementById('age').value = data.age;
        document.getElementById('weight').value = data.weight;
        document.getElementById('program').value = data.program;
        
        document.getElementById('summary').innerText = 
            `CLIENT PROFILE\n--------------\n` +
            `Name     : ${data.name}\n` +
            `Age      : ${data.age}\n` +
            `Weight   : ${data.weight} kg\n` +
            `Program  : ${data.program}\n` +
            `Calories : ${data.calories} kcal/day`;
    }
}
</script>
</body>
</html>
