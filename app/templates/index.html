<!DOCTYPE html>
<html>
<head>
    <title>ACEest Fitness v2.1.2</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .card { background: #262626; border: 2px solid #d4af37; padding: 25px; border-radius: 10px; max-width: 600px; margin: auto; }
        h1 { color: #d4af37; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; color: #d4af37; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box;}
        button { width: 100%; padding: 12px; background: #d4af37; color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .progress-section { margin-top: 30px; border-top: 1px solid #444; padding-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h1>ACEest PERFORMANCE v2.1.2</h1>
    
    <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="name">
    </div>
    <div class="input-group">
        <label>Age</label>
        <input type="number" id="age">
    </div>
    <div class="input-group">
        <label>Weight (kg)</label>
        <input type="number" id="weight">
    </div>
    <div class="input-group">
        <label>Target Program</label>
        <select id="program">
            {% for p in programs %}
            <option value="{{ p }}">{{ p }}</option>
            {% endfor %}
        </select>
    </div>
    <button onclick="sendData('/save_client')">Save Client Profile</button>

    <div class="progress-section">
        <h3>Weekly Adherence Log</h3>
        <div class="input-group">
            <label>Adherence (%)</label>
            <input type="range" id="adherence" min="0" max="100" value="80" oninput="this.nextElementSibling.value = this.value">
            <output style="color: #d4af37; font-weight: bold;">80</output>%
        </div>
        <button onclick="sendData('/save_progress')" style="background: #444; color: white;">Log Weekly Progress</button>
    </div>
</div>

<script>
async function sendData(endpoint) {
    const payload = {
        name: document.getElementById('name').value,
        age: document.getElementById('age').value,
        weight: document.getElementById('weight').value,
        program: document.getElementById('program').value,
        adherence: document.getElementById('adherence').value
    };

    const response = await fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
    });
    
    const result = await response.json();
    alert(result.message);
}
</script>
</body>
</html>
